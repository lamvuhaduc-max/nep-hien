<svg width="560" height="160" viewBox="0 0 560 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo Nếp Hiên – Furniture &amp; Interior</title>

  <!-- ── ARCH ICON (cream on dark) ── -->
  <line x1="16" y1="138" x2="100" y2="138" stroke="#F5EFE0" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="26" y1="138" x2="26" y2="88" stroke="#F5EFE0" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="90" y1="138" x2="90" y2="88" stroke="#F5EFE0" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M26 88 Q26 46 58 46 Q90 46 90 88" fill="none" stroke="#F5EFE0" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Roof element (terracotta — giữ màu thương hiệu) -->
  <path d="M8 38 Q58 18 108 38" fill="none" stroke="#E07040" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M8 38 Q3 31 6 22" fill="none" stroke="#E07040" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M108 38 Q113 31 110 22" fill="none" stroke="#E07040" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="58" cy="12" r="4" fill="#E07040"/>

  <!-- ── TEXT (cream) ── -->
  <text x="138" y="105"
    font-family="Georgia, 'Times New Roman', serif"
