<svg width="560" height="160" viewBox="0 0 560 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo Nếp Hiên – Furniture &amp; Interior</title>

  <!-- ── ARCH ICON ── -->
  <!-- Base -->
  <line x1="16" y1="138" x2="100" y2="138" stroke="#1F2020" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Left pillar -->
  <line x1="26" y1="138" x2="26" y2="88" stroke="#1F2020" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Right pillar -->
  <line x1="90" y1="138" x2="90" y2="88" stroke="#1F2020" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Arch -->
  <path d="M26 88 Q26 46 58 46 Q90 46 90 88" fill="none" stroke="#1F2020" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Roof element (terracotta) -->
  <path d="M8 38 Q58 18 108 38" fill="none" stroke="#C0562C" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Left upturn -->
  <path d="M8 38 Q3 31 6 22" fill="none" stroke="#C0562C" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Right upturn -->
  <path d="M108 38 Q113 31 110 22" fill="none" stroke="#C0562C" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Dot -->
  <circle cx="58" cy="12" r="4" fill="#C0562C"/>

  <!-- ── TEXT ── -->
  <!-- NEP HIEN -->
  <text x="138" y="105"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    letter-spacing="4"
    fill="#1F2020"
    font-weight="normal">NEP HIEN</text>

  <!-- FURNITURE &amp; INTERIOR -->
  <text x="141" y="136"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    letter-spacing="7"
    fill="#C0562C"
    font-weight="normal">FURNITURE &amp; INTERIOR</text>
</svg>
